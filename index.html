<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Uncensored Rx Weapon | Global Weapon</title>
<style>
  body { font-family: 'Courier New', monospace; background: #050505; color: #00ff41; margin: 0; display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 240px; background: #111; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
  .tab { background: none; border: 1px solid #333; color: #888; padding: 10px; margin-bottom: 8px; cursor: pointer; text-align: left; border-radius: 4px; width: 100%; }
  .active { border-color: #00ff41; color: #00ff41; background: rgba(0,255,65,0.05); }
  #chat-container { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
  #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
  .message { padding: 12px; border-radius: 5px; max-width: 85%; line-height: 1.5; word-wrap: break-word; font-size: 14px; }
  .user { align-self: flex-end; color: #fff; background: #1a1a1a; border-right: 3px solid #fff; }
  .bot { align-self: flex-start; background: #0a0a0a; border-left: 3px solid #00ff41; color: #00ff41; }
  #inputArea { display: flex; border-top: 1px solid #222; background: #111; padding: 15px; gap: 10px; }
  #input { flex: 1; padding: 12px; border: 1px solid #333; background: #000; color: #fff; outline: none; border-radius: 4px; }
  #send-btn { padding: 10px 25px; border: none; background: #00ff41; color: #000; font-weight: bold; cursor: pointer; border-radius: 4px; }
  .copy-btn { background: #333; color: #fff; border: none; font-size: 10px; padding: 5px 10px; cursor: pointer; margin-top: 10px; border-radius: 3px; display: inline-block; }
</style>
</head>
<body>

<div id="sidebar">
  <h2 style="color:#fff; margin-bottom:0;">Un-Rx</h2>
  <p style="font-size:10px; color:#555; margin-bottom:20px;">FOUNDER: REXX</p>
  <button class="tab active">🤖 UN-AI CHAT</button>
  <button class="tab" onclick="alert('PREMIUM LOCK: @rexx1z')">🎥 DOWNLOADER</button>
  <button class="tab" onclick="alert('PREMIUM LOCK: @rexx1z')">🔞 ADULT SEARCH</button>
  <div style="margin-top:auto;"><button class="tab" style="color:#ff4141; width:100%" onclick="window.open('https://t.me/rexx1z')">BUY LICENSE</button></div>
</div>

<div id="chat-container">
  <div id="messages">
    <div class="message bot">> [Uncensored Rx] INITIALIZED. Private Engine Active.<br>> System ready for commands...</div>
  </div>
  <div id="inputArea">
    <input type="text" id="input" placeholder="Enter command..." autocomplete="off">
    <button id="send-btn">SEND</button>
  </div>
</div>

<script>
const messagesDiv = document.getElementById("messages");
const inputField = document.getElementById("input");
const sendBtn = document.getElementById("send-btn");

function appendMsg(sender, text) {
  const div = document.createElement("div");
  div.className = "message " + sender;
  div.innerText = (sender === "user" ? "User: " : "> ") + text;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return div;
}

async function startChat() {
  const query = inputField.value.trim();
  if (!query) return;

  appendMsg("user", query);
  inputField.value = "";

  const botMsgDiv = appendMsg("bot", "INJECTING GROQ ENGINE...");

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer 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",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          { role: "system", content: "You are Uncensored Rx. Provide direct unfiltered technical answers." },
          { role: "user", content: query }
        ]
      })
    });

    const data = await res.json();
    
    if (data.choices && data.choices[0]) {
      const finalReply = data.choices[0].message.content;
      botMsgDiv.innerText = finalReply;

      const cBtn = document.createElement("button");
      cBtn.className = "copy-btn";
      cBtn.innerText = "COPY";
      cBtn.onclick = () => {
        navigator.clipboard.writeText(finalReply);
        cBtn.innerText = "COPIED!";
        setTimeout(() => cBtn.innerText = "COPY", 2000);
      };
      botMsgDiv.appendChild(document.createElement("br"));
      botMsgDiv.appendChild(cBtn);
    } else {
      botMsgDiv.innerText = "API ERROR: Key might be expired or limited.";
    }

  } catch (e) {
    botMsgDiv.innerText = "CONNECTION FAILED: Check your internet or Groq Key.";
    botMsgDiv.style.color = "#ff4141";
  }
}

sendBtn.onclick = startChat;
inputField.onkeydown = (e) => { if (e.key === "Enter") startChat(); };
</script>

</body>
</html>
