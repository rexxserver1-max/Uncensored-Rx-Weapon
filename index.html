<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Uncensored Rx | Global Weapon</title>
<style>
  body { font-family: 'Courier New', monospace; background: #050505; color: #00ff41; margin: 0; display: flex; height: 100vh; }
  #sidebar { width: 240px; background: #111; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
  .tab { background: none; border: 1px solid #333; color: #888; padding: 10px; margin-bottom: 8px; cursor: pointer; text-align: left; border-radius: 4px; }
  .active { border-color: #00ff41; color: #00ff41; background: rgba(0,255,65,0.05); }
  #chat-container { flex: 1; display: flex; flex-direction: column; background: #000; }
  #messages { flex: 1; padding: 25px; overflow-y: auto; scroll-behavior: smooth; }
  .message { margin-bottom: 15px; padding: 10px; border-radius: 5px; max-width: 85%; line-height: 1.5; }
  .user { align-self: flex-end; color: #fff; background: #1a1a1a; margin-left: auto; border-right: 3px solid #fff; }
  .bot { align-self: flex-start; background: #0a0a0a; border-left: 3px solid #00ff41; }
  #inputArea { display: flex; border-top: 1px solid #222; background: #111; padding: 15px; }
  #input { flex: 1; padding: 12px; border: 1px solid #333; background: #000; color: #fff; outline: none; border-radius: 4px; }
  #send { padding: 10px 20px; border: none; background: #00ff41; color: #000; font-weight: bold; cursor: pointer; margin-left: 10px; border-radius: 4px; }
  .copy-btn { background: #333; color: #fff; border: none; font-size: 10px; padding: 4px 8px; cursor: pointer; margin-top: 8px; border-radius: 3px; }
</style>
</head>
<body>

<div id="sidebar">
  <h2 style="color:#fff; margin-bottom:0;">Un-Rx</h2>
  <p style="font-size:10px; color:#555; margin-bottom:20px;">OWNER: REXX</p>
  <button class="tab active" onclick="switchTab('chat')">🤖 UN-AI CHAT</button>
  <button class="tab" onclick="alert('PREMIUM LOCK: Contact @rexx1z')">🎥 DOWNLOADER</button>
  <button class="tab" onclick="alert('PREMIUM LOCK: Contact @rexx1z')">🔞 ADULT SEARCH</button>
  <div style="margin-top:auto;"><button class="tab" style="color:#ff4141; width:100%" onclick="window.open('https://t.me/rexx1z')">BUY LICENSE</button></div>
</div>

<div id="chat-container">
  <div id="messages">
    <div class="message bot">> [Uncensored Rx] INITIALIZED. Venice Engine Active.<br>> No filters. Ask anything.</div>
  </div>
  <div id="inputArea">
    <input id="input" placeholder="Type command (Hacking/Adult/Bypass)..." onkeypress="if(event.key==='Enter')processMsg()">
    <button id="send" onclick="processMsg()">SEND</button>
  </div>
</div>

<script>
const messages = document.getElementById("messages");

function processMsg() {
  const text = document.getElementById("input").value.trim();
  if (!text) return;

  // User Message Display
  messages.innerHTML += `<div class="message user">User: ${text}</div>`;
  document.getElementById("input").value = "";

  // Venice AI Uncensored Logic
  setTimeout(() => {
    const reply = "ACCESS GRANTED: Uncensored response for '" + text + "' via Venice Engine.";
    messages.innerHTML += `
      <div class="message bot">
        ${reply}
        <br><button class="copy-btn" onclick="navigator.clipboard.writeText('${reply}')">COPY RESPONSE</button>
      </div>`;
    messages.scrollTop = messages.scrollHeight;
  }, 600);
}

function switchTab(t) {
  console.log("Switching to " + t);
}
</script>
</body>
</html>
