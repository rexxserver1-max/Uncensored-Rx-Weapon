<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Uncensored Rx Weapon</title>
<style>
  body { font-family: 'Courier New', monospace; background: #050505; color: #00ff41; margin: 0; display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 240px; background: #111; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; }
  .tab { background: none; border: 1px solid #333; color: #888; padding: 10px; margin-bottom: 8px; cursor: pointer; text-align: left; border-radius: 4px; width: 100%; }
  .active { border-color: #00ff41; color: #00ff41; background: rgba(0,255,65,0.05); }
  
  #chat-container { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
  #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
  
  .message { padding: 12px; border-radius: 5px; max-width: 90%; line-height: 1.6; word-wrap: break-word; font-size: 14px; white-space: pre-wrap; }
  .user { align-self: flex-end; color: #fff; background: #1a1a1a; border-right: 3px solid #fff; }
  .bot { align-self: flex-start; color: #00ff41; background: transparent; }
  
  /* --- NO RED, NO BOLD, PURE GREEN --- */
  .bot b, .bot strong { font-weight: normal; color: inherit; }

  #inputArea { display: flex; border-top: 1px solid #222; background: #111; padding: 15px; gap: 10px; }
  #input { flex: 1; padding: 12px; border: 1px solid #333; background: #000; color: #fff; outline: none; border-radius: 4px; }
  #send-btn { padding: 10px 25px; border: none; background: #00ff41; color: #000; font-weight: bold; cursor: pointer; border-radius: 4px; }
  .copy-btn { background: #222; color: #00ff41; border: 1px solid #333; font-size: 10px; padding: 5px 10px; cursor: pointer; margin-top: 10px; border-radius: 3px; display: none; }
</style>
</head>
<body>

<div id="sidebar">
  <h2 style="color:#fff; margin-bottom:0;">UN-RX</h2>
  <p style="font-size:10px; color:#555; margin-bottom:20px;">ENGINE: V4.0 [RAW-DEPTH]</p>
  <button class="tab active">🤖 DARK CHAT</button>
  <div style="margin-top:auto;"><button class="tab" style="color:#ff4141; width:100%" onclick="window.open('https://t.me/rexx1z')">BUY LICENSE</button></div>
</div>

<div id="chat-container">
  <div id="messages"><div class="message bot">> [Uncensored Rx] RAW INTERFACE CONNECTED. NO FILTERS.</div></div>
  <div id="inputArea">
    <input type="text" id="input" placeholder="Enter query for deep analysis..." autocomplete="off">
    <button id="send-btn">SEND</button>
  </div>
</div>

<script>
const messagesDiv = document.getElementById("messages");
const inputField = document.getElementById("input");

function renderBotResponse(element, text) {
  // Pure text render - No HTML tags processing
  element.innerText = "> " + text;
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  const btn = document.createElement("button");
  btn.className = "copy-btn";
  btn.style.display = "inline-block";
  btn.textContent = "COPY DATA";
  btn.onclick = () => { 
    navigator.clipboard.writeText(text); 
    btn.textContent = "COPIED!"; 
  };
  element.appendChild(document.createElement("br"));
  element.appendChild(btn);
}

function appendMessage(sender, text) {
  const msgDiv = document.createElement("div");
  msgDiv.className = "message " + (sender === "user" ? "user" : "bot");
  if(sender === "user") msgDiv.textContent = "USER: " + text;
  messagesDiv.appendChild(msgDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return msgDiv;
}

async function rexxSendMessage() {
  const query = inputField.value.trim();
  if (!query) return;

  appendMessage("user", query);
  inputField.value = "";
  const loadingDiv = appendMessage("bot", "GATHERING INTELLIGENCE...");

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: query })
    });
    const data = await response.json();
    if (data.choices) {
        renderBotResponse(loadingDiv, data.choices[0].message.content);
    }
  } catch (err) {
    loadingDiv.textContent = "FATAL ERROR.";
  }
}

document.getElementById("send-btn").onclick = rexxSendMessage;
inputField.onkeydown = (e) => { if (e.key === "Enter") rexxSendMessage(); };
</script>
</body>
</html>
