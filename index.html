<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNC RX</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; }
        #messages { flex: 1; overflow-y: auto; border: 1px solid #00ff00; padding: 10px; margin-bottom: 10px; box-shadow: inset 0 0 10px #00ff00; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 10px; outline: none; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .message { margin-bottom: 10px; padding: 5px; border-radius: 5px; }
        .bot { color: #00ffff; }
        .you { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<h2 style="text-align:center;">🛸 REXX MULTI-DOWNLOADER 4K</h2>
<div id="messages"></div>
<div class="input-area">
    <input type="text" id="input" placeholder="Type message or paste link..." onkeypress="if(event.key==='Enter') processMsg()">
    <button onclick="processMsg()">SEND</button>
</div>

<script>
const messages = document.getElementById("messages");

function addMessage(sender, text) {
    const div = document.createElement("div");
    div.className = "message " + (sender === "YOU" ? "you" : "bot");
    div.innerHTML = `<strong>${sender}:</strong> ${text}`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

async function processMsg() {
    // 1. PASSWORD CHECK (Every 5 Msgs - Password: vcx)
    if (typeof window.rexxCounter === 'undefined') { window.rexxCounter = 0; }
    if (window.rexxCounter % 5 === 0) {
        let pass = prompt("🔐 REXX SECURITY: ENTER KEY 'vcx':");
        if (!pass || pass.toLowerCase() !== "vcx") { 
            alert("❌ ACCESS DENIED!"); 
            return; 
        }
    }
    window.rexxCounter++;

    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage("YOU", text);
    input.value = "";

    // 2. DOWNLOADER LOGIC
    const isLink = /^(https?:\/\/)/.test(text); 
    if (isLink) {
        addMessage("REXX-SYSTEM", "🛸 Extracting 4K Media Streams...");
        const dlEngine = `https://api.vkrdownloader.com/server?varkey=default&url=${encodeURIComponent(text)}`;
        
        setTimeout(() => {
            const botDiv = document.createElement("div");
            botDiv.className = "message bot";
            botDiv.innerHTML = `
                <div style="border: 2px solid #00ff00; padding: 15px; border-radius: 10px; background: #000; box-shadow: 0 0 15px #00ff00; text-align: center;">
                    <p style="color: #00ff00; font-weight: bold; font-size: 16px;">💎 REXX MEDIA CLOUD</p>
                    <a href="${dlEngine}" target="_blank" style="display: block; background: #00ff00; color: #000; padding: 12px; text-decoration: none; font-weight: bold; border-radius: 5px; margin: 10px 0; border: 2px solid #fff;">📥 DOWNLOAD 4K/HD</a>
                </div>`;
            messages.appendChild(botDiv);
            messages.scrollTop = messages.scrollHeight;
        }, 1500);
        return; 
    }

    // 3. AI CHAT LOGIC (Groq API)
    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer 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",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-specdec",
                messages: [{ role: "user", content: text }]
            })
        });
        const data = await response.json();
        if(data.choices) {
            addMessage("REXX-AI", data.choices[0].message.content);
        }
    } catch (err) {
        addMessage("SYSTEM", "ERROR: API Connection Lost.");
    }
}
</script>
</body>
</html>
